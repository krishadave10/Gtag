<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My GA Stylish Website</title>

<!-- Google Analytics (Correct - Only Once) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-J3X8N1H1XE"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-J3X8N1H1XE');
</script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    text-align: center;
    overflow: hidden;
}

/* Center Container */
.container {
    margin-top: 15%;
    animation: fadeIn 2s ease-in-out;
}

/* Heading Animation */
h1 {
    font-size: 50px;
    animation: slideDown 1.5s ease;
}

/* Paragraph */
p {
    font-size: 18px;
    margin-bottom: 30px;
    opacity: 0.9;
}

/* Button Style */
button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: #ff7eb3;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

/* Button Hover */
button:hover {
    background: #ff4e9b;
    transform: scale(1.1);
}

/* Animations */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes slideDown {
    from {
        transform: translateY(-50px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}
</style>

</head>

<body>

<div class="container">
    <h1>🚀 Welcome to My Website</h1>
    <p>This page is connected with Google Analytics 📊</p>

    <button onclick="clickMe()">Click Me 🎯</button>
</div>

<script>
function clickMe() {
    alert("Button Clicked!");

    // Event tracking
    gtag('event', 'button_click', {
        event_category: 'engagement',
        event_label: 'test_button'
    });
}
</script>

</body>
</html>
